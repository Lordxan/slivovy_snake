<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slivovy — Snake</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 255, 60, 0.15);
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #8f8;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <script type="module">
        import init from "./pkg/slivovy_snake.js";
        init();
    </script>
</body>
</html>
