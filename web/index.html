<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slivovy — Snake</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            user-select: none;
        }

        #background-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            border: none;
            opacity: 0.4;
            z-index: 1;
        }

        #game-container {
            position: relative;
            z-index: 2;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 255, 60, 0.15);
            opacity: 0.7;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #8f8;
            font-size: 14px;
            pointer-events: none;
        }

        #toggle-iframe-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            color: #8f8;
            border: 1px solid #8f8;
            border-radius: 4px;
            padding: 8px 14px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            cursor: pointer;
            pointer-events: auto;
            transition: background 0.2s;
        }

        #toggle-iframe-btn:hover {
            background: rgba(0, 255, 60, 0.2);
        }
    </style>
</head>
<body>
    <iframe id="background-iframe" src="https://lordxan.github.io/slivovy/" allowfullscreen></iframe>
    <div id="game-container">
        <canvas id="game">
            <div id="status">Loading...</div>
        </canvas>
    </div>
    <script type="module">
        import init from "./pkg/slivovy_snake.js";
        init();
    </script>
    <button id="toggle-iframe-btn">Hide Background</button>
    <script>
        // Ensure canvas is visible behind iframe by dynamically adjusting z-index
        (function() {
            const canvas = document.getElementById('game');
            const iframe = document.getElementById('background-iframe');
            const toggleBtn = document.getElementById('toggle-iframe-btn');
            
            // Place canvas above the iframe so it's visible
            canvas.style.position = 'fixed';
            canvas.style.zIndex = '3';
            
            // Center canvas on the page
            canvas.style.top = '50%';
            canvas.style.left = '50%';
            canvas.style.transform = 'translate(-50%, -50%)';
            
            // Track canvas visibility state
            let canvasVisible = true;
            
            // Toggle canvas visibility on button click
            toggleBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                canvasVisible = !canvasVisible;
                
                if (canvasVisible) {
                    canvas.style.display = 'block';
                    toggleBtn.textContent = 'Collapse Canvas';
                } else {
                    canvas.style.display = 'none';
                    toggleBtn.textContent = 'Expand Canvas';
                }
            });
        })();
    </script>
</body>
</html>
